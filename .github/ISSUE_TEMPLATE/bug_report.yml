name: Bug Report
description: Something isn't rendering correctly or the app is broken
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please search [existing issues](https://github.com/denislirette/baseballscorebook/issues) first to avoid duplicates. If your issue already exists, add a comment or reaction instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "e.g., The pitch sequence shows an extra pitch that wasn't thrown..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead.
      placeholder: "e.g., The pitch count should match the broadcast..."
    validations:
      required: true

  - type: textarea
    id: game-details
    attributes:
      label: Game details (if relevant)
      description: Date, teams, and where in the game the issue appears.
      placeholder: |
        Date: 2025-07-04
        Teams: LAA @ TOR
        Inning/at-bat: Top 5th, 2nd batter
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If it's a rendering issue, screenshots help a lot.
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "e.g., Chrome 125 on macOS 15"
    validations:
      required: false
