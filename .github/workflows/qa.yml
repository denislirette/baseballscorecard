name: QA Pipeline

# Run on every pull request targeting master
on:
  pull_request:
    branches: [master]

jobs:
  qa:
    name: Lint, Test, Accessibility, Visual Regression
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      # Verify the project builds successfully
      - name: Build
        run: npm run build

      # Check for dependency vulnerabilities
      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      # ESLint: code quality and browser compat
      - name: Lint (JS)
        run: npm run lint

      # Stylelint: CSS quality
      - name: Lint (CSS)
        run: npm run lint:css

      # Spell check
      - name: Spellcheck
        run: npm run spellcheck

      # Vitest: unit tests for game-data.js
      - name: Unit tests
        run: npm run test:unit

      # Accessibility: axe-core WCAG 2.2 AA (all browsers)
      - name: Accessibility tests
        run: npm run test:a11y

      # Visual regression: screenshot comparison (all browsers)
      - name: Visual regression tests
        run: npm run test:visual

      # Upload reports and diffs on failure
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload visual diff images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: test-results/
          retention-days: 14
