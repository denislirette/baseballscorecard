<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Cell Reference</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { padding: 24px; max-width: 1600px; margin: 0 auto; }
  h1 { margin-bottom: 4px; }
  .subtitle { color: var(--text-secondary); margin-bottom: 20px; }
  .section { margin-bottom: 32px; }
  .section h2 { margin-bottom: 12px; border-bottom: 2px solid var(--grid-line); padding-bottom: 4px; }
  .cell-grid { display: flex; flex-wrap: wrap; gap: 16px; }
  .cell-card { display: flex; flex-direction: column; align-items: center; }
  .cell-ref { font-size: 11px; color: var(--link); font-weight: 700; margin-bottom: 2px; }
  .cell-desc { font-size: 11px; color: var(--text-secondary); max-width: 150px; text-align: center; margin-top: 2px; line-height: 1.3; }
  .controls { margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
  .controls button {
    background: var(--surface); color: var(--text); border: 1px solid var(--grid-line);
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 14px;
  }
  .controls button:hover { background: var(--grid-line); }
</style>
</head>
<body>
<h1>Play Cell Reference</h1>
<p class="subtitle">All possible play cell states rendered with the actual scorecard engine. Reference by # number.</p>
<div class="controls">
  <button id="theme-toggle">Toggle Dark Mode</button>
</div>
<div id="gallery"></div>

<script type="module">
import { svgEl, svgText, refreshLayout, getColors, drawAtBatCell, drawSubIndicator } from './js/svg-renderer.js';
import { getConfig } from './js/layout-config.js';

document.getElementById('theme-toggle').addEventListener('click', () => {
  const html = document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? '' : 'dark');
  setTimeout(render, 50);
});

// ── Pitch helpers ────────────────────────────────────
function p(callCode, type, speed, px, pz) {
  return { callCode, pitchType: type, speed: String(speed), px: px ?? 0, pz: pz ?? 2.5 };
}

// ── At-bat builder ───────────────────────────────────
function ab(notation, eventType, seq, opts = {}) {
  return {
    batterId: opts.batterId || 1,
    pitcherId: 100,
    pitchSequence: seq,
    notation,
    runners: opts.runners || [],
    cumulativeRunners: opts.cumulativeRunners || null,
    result: { eventType, rbi: opts.rbi || 0, isOut: opts.isOut ?? true },
    rbi: opts.rbi || 0,
    spKNumber: opts.spKNumber || null,
    outNumber: opts.outNumber || null,
    about: {},
  };
}

// ── Journey helper (segments array) ──────────────────
function seg(from, to, isOutSegment = false) { return { from, to, isOutSegment }; }
function journey(id, segs, opts = {}) {
  return { playerId: id, segments: segs, scored: opts.scored || false, isOut: opts.isOut || false, outBase: opts.outBase || null, outNumber: opts.outNumber || null };
}

// ── Pitch sequences ──────────────────────────────────
const K_SWING = [p('C','FF',95,-0.2,2.8), p('B','SL',84,1.2,1.8), p('S','FF',96,0.3,3.1)];
const K_LOOK  = [p('B','CU',78,-1.5,1.0), p('S','FF',94,0.1,2.6), p('F','FF',95,0.4,2.4), p('C','SL',86,-0.3,2.2)];
const FLY     = [p('B','CH',86,1.0,1.5), p('F','FF',93,0.2,2.5), p('X','FF',94,-0.1,2.8)];
const GND     = [p('S','FF',92,0.3,2.6), p('X','CH',84,0.0,2.0)];
const HIT1    = [p('B','SL',85,-1.3,1.2), p('C','FF',96,0.2,2.5), p('F','FF',95,0.5,3.0), p('X','CH',87,0.1,2.1)];
const HIT2    = [p('B','CU',80,1.4,1.0), p('X','FF',97,0.0,2.6)];
const HIT3    = [p('C','SL',84,-0.2,2.4), p('B','FF',96,-1.0,3.8), p('X','FF',95,0.3,2.7)];
const HR_SEQ  = [p('B','CH',85,1.5,1.0), p('S','FF',94,0.3,2.8), p('F','SL',86,-0.4,2.1), p('X','FF',96,0.1,2.5)];
const BB_SEQ  = [p('B','SL',84,1.2,1.5), p('C','FF',95,0.2,2.6), p('B','CH',86,-1.3,1.1), p('F','FF',94,0.5,2.9), p('B','CU',78,1.4,0.9), p('B','FF',97,-1.1,3.9)];
const HBP_SEQ = [p('B','FF',93,1.3,2.0), p('H','SL',85,-0.8,2.3)];
const FC_SEQ  = [p('B','CH',84,1.1,1.4), p('S','FF',93,0.2,2.7), p('X','FF',95,-0.1,2.3)];
const DP_SEQ  = [p('C','CH',82,-0.3,2.2), p('F','FF',94,0.4,2.8), p('F','CH',83,0.1,2.0), p('X','CH',84,0.0,1.9)];
const SF_SEQ  = [p('B','SL',83,-1.4,1.2), p('F','FF',94,0.3,3.0), p('X','FF',95,-0.2,2.6)];
const SH_SEQ  = [p('X','FF',90,0.0,2.2)];
const ERR_SEQ = [p('B','CU',79,1.5,0.8), p('F','FF',93,0.2,2.7), p('X','FF',94,-0.1,2.4)];
const KWP_SEQ = [p('S','FF',95,0.1,2.7), p('F','SL',85,-0.4,2.2), p('S','CU',79,0.2,1.8)];
const LONG    = [p('B','FF',94,1.2,3.5), p('C','SL',85,-0.2,2.3), p('F','FF',95,0.3,2.8), p('B','CH',86,-1.1,1.2), p('F','FF',94,0.5,3.1), p('F','SL',84,-0.3,2.0), p('B','CU',79,1.3,0.9), p('F','FF',96,0.1,2.6), p('X','FF',95,0.0,2.4)];
const SHORT   = [p('X','FF',94,0.1,2.5)];

// ── Cell definitions ─────────────────────────────────
const SECTIONS = [
  { title: 'Outs (No Runners)', cells: [
    { id:1,  label:'Strikeout swinging (out #1)',  data: ab('K','strikeout',K_SWING,{outNumber:1}) },
    { id:2,  label:'Strikeout looking (out #2)',   data: ab('\u{A4D8}','strikeout',K_LOOK,{outNumber:2}) },
    { id:3,  label:'K with SP count K\u2085 (out #3)', data: ab('K','strikeout',K_SWING,{spKNumber:5,outNumber:3}) },
    { id:4,  label:'Flyout to RF F9 (out #1)',     data: ab('F9','field_out',FLY,{outNumber:1}) },
    { id:5,  label:'Flyout to CF F8 (out #2)',     data: ab('F8','field_out',FLY,{outNumber:2}) },
    { id:6,  label:'Lineout to SS L6 (out #3)',    data: ab('L6','field_out',FLY,{outNumber:3}) },
    { id:7,  label:'Pop out to 2B P4 (out #1)',    data: ab('P4','field_out',SHORT,{outNumber:1}) },
    { id:8,  label:'Groundout 6-3 (out #2)',       data: ab('G63','field_out',GND,{outNumber:2}) },
    { id:9,  label:'Groundout 4-3 (out #3)',       data: ab('G43','field_out',GND,{outNumber:3}) },
    { id:10, label:'Groundout unassisted (out #1)', data: ab('G3','field_out',GND,{outNumber:1}) },
    { id:11, label:'Infield fly IFF (out #2)',     data: ab('F6(IFF)','field_out',FLY,{outNumber:2}) },
  ]},

  { title: 'Hits', cells: [
    { id:12, label:'Single',  data: ab('1B','single',HIT1,{isOut:false,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
    { id:13, label:'Double',  data: ab('2B','double',HIT2,{isOut:false,
      runners:[{start:null,end:'2B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B'),seg('1B','2B')])]}) },
    { id:14, label:'Triple',  data: ab('3B','triple',HIT3,{isOut:false,
      runners:[{start:null,end:'3B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B'),seg('1B','2B'),seg('2B','3B')])]}) },
    { id:15, label:'Home Run (solo)', data: ab('HR','home_run',HR_SEQ,{isOut:false,rbi:1,
      runners:[{start:null,end:'score',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B'),seg('1B','2B'),seg('2B','3B'),seg('3B','HP')],{scored:true})]}) },
    { id:16, label:'Grand Slam (4 RBI)', data: ab('HR','home_run',HR_SEQ,{isOut:false,rbi:4,
      runners:[{start:null,end:'score',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B'),seg('1B','2B'),seg('2B','3B'),seg('3B','HP')],{scored:true})]}) },
  ]},

  { title: 'Walks / HBP / CI', cells: [
    { id:17, label:'Walk (BB)', data: ab('BB','walk',BB_SEQ,{isOut:false,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
    { id:18, label:'Intentional Walk (IBB)', data: ab('IBB','intent_walk',[],{isOut:false,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
    { id:19, label:'Hit By Pitch', data: ab('HBP','hit_by_pitch',HBP_SEQ,{isOut:false,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
    { id:20, label:'Catcher Interference', data: ab('CI','catcher_interf',SHORT,{isOut:false,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
  ]},

  { title: 'Double Play / Sac / FC / Error', cells: [
    { id:21, label:'DP 6-4-3 (no diamond, split text)', data: ab('DP643','grounded_into_double_play',DP_SEQ,{outNumber:1}) },
    { id:22, label:'DP 6-4-3 with runner out at 2B', data: ab('DP643','grounded_into_double_play',DP_SEQ,{outNumber:1,
      runners:[{start:'1B',end:null,isOut:true,playerId:2},{start:null,end:null,isOut:true,playerId:1}],
      cumulativeRunners:[journey(2,[seg('HP','1B'),seg('1B','2B',true)],{isOut:true,outBase:'2B',outNumber:2})]}) },
    { id:23, label:'DP with runner advancing to 3B', data: ab('DP643','grounded_into_double_play',DP_SEQ,{outNumber:1,
      runners:[{start:'2B',end:'3B',isOut:false,playerId:3},{start:'1B',end:null,isOut:true,playerId:2},{start:null,end:null,isOut:true,playerId:1}],
      cumulativeRunners:[journey(2,[seg('HP','1B'),seg('1B','2B',true)],{isOut:true,outBase:'2B',outNumber:2})]}) },
    { id:24, label:'Sac Fly SF8 (1 RBI, no diamond)', data: ab('SF8','sac_fly',SF_SEQ,{rbi:1,outNumber:2}) },
    { id:25, label:'Sac Bunt SH14', data: ab('SH14','sac_bunt',SH_SEQ,{
      runners:[{start:'1B',end:'2B',isOut:false,playerId:2}],
      cumulativeRunners:[journey(2,[seg('HP','1B'),seg('1B','2B')])]}) },
    { id:26, label:"Fielder's Choice FC64", data: ab('FC64','fielders_choice',FC_SEQ,{isOut:false,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[
        journey(1,[seg('HP','1B')]),
        journey(2,[seg('HP','1B'),seg('1B','2B',true)],{isOut:true,outBase:'2B',outNumber:1}),
      ]}) },
    { id:27, label:'Error E6', data: ab('E6','field_error',ERR_SEQ,{isOut:false,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
  ]},

  { title: 'Runner Out Positions (numbered marker)', cells: [
    { id:28, label:'Out at 1B (out #1)', data: ab('G63','field_out',GND,{outNumber:1,
      cumulativeRunners:[journey(1,[seg('HP','1B',true)],{isOut:true,outBase:'1B',outNumber:1})]}) },
    { id:29, label:'Out at 2B caught stealing (out #2)', data: ab('K','strikeout',K_SWING,{batterId:1,outNumber:2,
      cumulativeRunners:[journey(2,[seg('HP','1B'),seg('1B','2B',true)],{isOut:true,outBase:'2B',outNumber:2})]}) },
    { id:30, label:'Out at 3B tag (out #3)', data: ab('F8','field_out',FLY,{outNumber:3,
      cumulativeRunners:[journey(2,[seg('HP','1B'),seg('1B','2B'),seg('2B','3B',true)],{isOut:true,outBase:'3B',outNumber:3})]}) },
    { id:31, label:'Out at Home (out #1)', data: ab('G63','field_out',GND,{outNumber:1,
      cumulativeRunners:[journey(2,[seg('HP','1B'),seg('1B','2B'),seg('2B','3B'),seg('3B','HP',true)],{isOut:true,outBase:'HP',outNumber:1})]}) },
  ]},

  { title: 'Runners Scoring (RBI dots)', cells: [
    { id:32, label:'Single, runner scores from 3B (1 RBI)', data: ab('1B','single',HIT1,{isOut:false,rbi:1,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
    { id:33, label:'Double, 2 RBI', data: ab('2B','double',HIT2,{isOut:false,rbi:2,
      runners:[{start:null,end:'2B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B'),seg('1B','2B')])]}) },
    { id:34, label:'3 RBI single', data: ab('1B','single',HIT1,{isOut:false,rbi:3,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
    { id:35, label:'Grand slam (4 RBI dots)', data: ab('HR','home_run',HR_SEQ,{isOut:false,rbi:4,
      runners:[{start:null,end:'score',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B'),seg('1B','2B'),seg('2B','3B'),seg('3B','HP')],{scored:true})]}) },
  ]},

  { title: 'Dropped Third Strike / Special K', cells: [
    { id:36, label:'K + Wild Pitch (reaches 1B)', data: ab('K WP','strikeout',KWP_SEQ,{isOut:false,batterId:1,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
    { id:37, label:'K + Passed Ball', data: ab('K PB','strikeout',KWP_SEQ,{isOut:false,batterId:1,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
    { id:38, label:'K + Error on catcher', data: ab('K E2','strikeout',KWP_SEQ,{isOut:false,batterId:1,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
    { id:39, label:'K with SB during AB (no diamond)', data: ab('K','strikeout',K_SWING,{batterId:1,
      runners:[{start:'1B',end:'2B',isOut:false,playerId:2},{start:null,end:null,isOut:true,playerId:1}]}) },
  ]},

  { title: 'Substitution Indicators', cells: [
    { id:40, label:'Pitcher change (dashed blue top)', data: ab('G43','field_out',GND,{outNumber:3}), sub:{type:'pitcher',num:0} },
    { id:41, label:'Pinch Hitter (solid blue left)', data: ab('1B','single',HIT1,{isOut:false,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}), sub:{type:'PH',num:2} },
    { id:42, label:'Pinch Runner (solid blue right)', data: ab('BB','walk',BB_SEQ,{isOut:false,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}), sub:{type:'PR',num:3} },
    { id:43, label:'Defensive sub (solid blue right)', data: ab('F7','field_out',FLY,{outNumber:1}), sub:{type:'defensive',num:1} },
  ]},

  { title: 'Pitch Sequence Length', cells: [
    { id:44, label:'1 pitch (first pitch out)', data: ab('P4','field_out',SHORT,{outNumber:1}) },
    { id:45, label:'9 pitches (battle AB)', data: ab('1B','single',LONG,{isOut:false,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
    { id:46, label:'0 pitches (IBB)', data: ab('IBB','intent_walk',[],{isOut:false,
      runners:[{start:null,end:'1B',isOut:false,playerId:1}],
      cumulativeRunners:[journey(1,[seg('HP','1B')])]}) },
  ]},

  { title: 'Multi-Word / Edge Cases', cells: [
    { id:47, label:'Batter Timeout', data: ab('Batter Timeout','batter_timeout',SHORT) },
    { id:48, label:'Pitching Substitution', data: ab('Pitching Substitution','pitching_sub',[]) },
    { id:49, label:'Active cell highlight', data: ab('','',[] ), active:true },
    { id:50, label:'Empty cell (no AB)', data: ab('','',[] ) },
  ]},
];

// ── Render ────────────────────────────────────────────
function render() {
  refreshLayout();
  const CLR = getColors();
  const cfg = getConfig();
  const W = cfg.COL_WIDTH;
  const H = cfg.ROW_HEIGHT;
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';

  for (const section of SECTIONS) {
    const sec = document.createElement('div');
    sec.className = 'section';
    const h2 = document.createElement('h2');
    h2.textContent = section.title;
    sec.appendChild(h2);
    const grid = document.createElement('div');
    grid.className = 'cell-grid';

    for (const cell of section.cells) {
      const card = document.createElement('div');
      card.className = 'cell-card';

      const ref = document.createElement('div');
      ref.className = 'cell-ref';
      ref.textContent = '#' + cell.id;
      card.appendChild(ref);

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('width', String(W * 0.7));
      svg.setAttribute('height', String(H * 0.7));

      // Background
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', '0'); rect.setAttribute('y', '0');
      rect.setAttribute('width', String(W)); rect.setAttribute('height', String(H));
      rect.setAttribute('fill', cell.active ? CLR.activeCell : CLR.cellBg);
      rect.setAttribute('stroke', CLR.gridBold); rect.setAttribute('stroke-width', '2');
      svg.appendChild(rect);

      // Use the real renderer
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      if (cell.data.notation || cell.data.pitchSequence.length > 0) {
        drawAtBatCell(g, CLR, cell.data, 0, 0);
      }
      if (cell.sub) {
        drawSubIndicator(g, CLR, 0, 0, cell.sub.type, cell.sub.num);
      }
      svg.appendChild(g);
      card.appendChild(svg);

      const desc = document.createElement('div');
      desc.className = 'cell-desc';
      desc.textContent = cell.label;
      card.appendChild(desc);

      grid.appendChild(card);
    }
    sec.appendChild(grid);
    gallery.appendChild(sec);
  }
}

render();
</script>
</body>
</html>
