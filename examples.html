<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Examples</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>
    // Accept theme from URL param or parent frame
    const params = new URLSearchParams(location.search);
    const theme = params.get('theme');
    if (theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else if (!theme && localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    window.addEventListener('message', (e) => {
      if (e.data === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      if (e.data === 'light') document.documentElement.removeAttribute('data-theme');
    });
  </script>
  <style>
    body { margin: 0; padding: 0; background: var(--sc-cell-bg, #faf9f6); }
    .examples { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px; justify-content: center; }
    .example-item { text-align: center; }
    .example-label { font-size: 11px; color: var(--text-secondary, #6b6462); margin-top: 4px; font-family: -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="root" class="examples"></div>

  <script type="module">
    window.onerror = (msg, src, line) => {
      document.getElementById('root').innerHTML = `<div style="color:red;padding:16px;font-size:14px;">Error: ${msg}<br>at ${src}:${line}</div>`;
    };

    import { drawAtBatCell, getColors, refreshLayout } from '/js/svg-renderer.js';
    import { getConfig } from '/js/layout-config.js';

    const params = new URLSearchParams(location.search);
    const show = params.get('show');
    const root = document.getElementById('root');
    const CLR = getColors();
    refreshLayout();
    const cfg = getConfig();
    const W = cfg.COL_WIDTH;
    const H = cfg.ROW_HEIGHT;

    function mkPitches(arr) {
      return arr.map(p => ({ callCode: p[0], speed: p[1], typeCode: p[2] }));
    }

    function mkRunners(playerId, bases, scored = false, isOut = false) {
      if (!bases || bases.length === 0) return [];
      const order = ['HP', '1B', '2B', '3B', 'HP'];
      const segments = [];
      for (let i = 0; i < bases; i++) {
        segments.push({ from: order[i], to: order[i + 1] });
      }
      return [{
        playerId,
        segments,
        currentBase: scored ? null : order[bases],
        scored,
        isOut,
        outBase: null,
        outNumber: null,
      }];
    }

    const all = {
      groundout: {
        label: 'Groundout (G6-3)',
        ab: { batterId: 1, notation: 'G6-3', outNumber: 1,
          pitchSequence: mkPitches([['S',94,'FF'],['B',87,'CH'],['F',91,'SL'],['X',96,'FF']]),
          cumulativeRunners: [], result: { rbi: 0 } },
      },
      strikeout: {
        label: 'Strikeout (K)',
        ab: { batterId: 2, notation: 'K', outNumber: 2,
          pitchSequence: mkPitches([['B',95,'FF'],['C',88,'CH'],['S',95,'FF'],['S',82,'CU']]),
          cumulativeRunners: [], result: { rbi: 0 } },
      },
      'called-k': {
        label: 'Called K (\u{A4D8})',
        ab: { batterId: 3, notation: '\u{A4D8}', outNumber: 3,
          pitchSequence: mkPitches([['B',93,'FF'],['F',87,'SL'],['B',94,'FF'],['C',80,'CU']]),
          cumulativeRunners: [], result: { rbi: 0 } },
      },
      flyout: {
        label: 'Fly Out (F8)',
        ab: { batterId: 4, notation: 'F8', outNumber: 1,
          pitchSequence: mkPitches([['C',94,'FF'],['B',80,'CU'],['X',93,'FF']]),
          cumulativeRunners: [], result: { rbi: 0 } },
      },
      lineout: {
        label: 'Line Out (L7)',
        ab: { batterId: 5, notation: 'L7', outNumber: 2,
          pitchSequence: mkPitches([['X',91,'SI']]),
          cumulativeRunners: [], result: { rbi: 0 } },
      },
      walk: {
        label: 'Walk (BB)',
        ab: { batterId: 6, notation: 'BB', outNumber: null,
          pitchSequence: mkPitches([['B',93,'FF'],['C',87,'CH'],['B',94,'FF'],['B',92,'FF'],['B',88,'CH']]),
          cumulativeRunners: mkRunners(6, 1), result: { rbi: 0 } },
      },
      hbp: {
        label: 'Hit By Pitch (HBP)',
        ab: { batterId: 7, notation: 'HBP', outNumber: null,
          pitchSequence: mkPitches([['B',93,'FF'],['H',88,'SL']]),
          cumulativeRunners: mkRunners(7, 1), result: { rbi: 0 } },
      },
      single: {
        label: 'Single (1B)',
        ab: { batterId: 8, notation: '1B', outNumber: null,
          pitchSequence: mkPitches([['B',91,'SI'],['X',86,'CH']]),
          cumulativeRunners: mkRunners(8, 1), result: { rbi: 0 } },
      },
      double: {
        label: 'Double (2B)',
        ab: { batterId: 9, notation: '2B', outNumber: null,
          pitchSequence: mkPitches([['C',94,'FF'],['X',89,'SL']]),
          cumulativeRunners: mkRunners(9, 2), result: { rbi: 1 } },
      },
      triple: {
        label: 'Triple (3B)',
        ab: { batterId: 10, notation: '3B', outNumber: null,
          pitchSequence: mkPitches([['X',93,'FF']]),
          cumulativeRunners: mkRunners(10, 3), result: { rbi: 2 } },
      },
      hr: {
        label: 'Home Run (HR)',
        ab: { batterId: 11, notation: 'HR', outNumber: null,
          pitchSequence: mkPitches([['B',94,'FF'],['S',87,'SL'],['B',95,'FF'],['X',88,'CH']]),
          cumulativeRunners: mkRunners(11, 4, true), result: { rbi: 2 } },
      },
      scored: {
        label: 'Scored (not HR)',
        ab: { batterId: 12, notation: '1B', outNumber: null,
          pitchSequence: mkPitches([['B',91,'SI'],['F',93,'FF'],['X',87,'CH']]),
          cumulativeRunners: mkRunners(12, 4, true), result: { rbi: 1 } },
      },
      grandsalam: {
        label: 'Grand Slam',
        ab: { batterId: 13, notation: 'HR', outNumber: null,
          pitchSequence: mkPitches([['B',94,'FF'],['S',87,'SL'],['B',95,'FF'],['X',92,'FF']]),
          cumulativeRunners: mkRunners(13, 4, true), result: { rbi: 4 } },
      },
      error: {
        label: 'Error (E6)',
        ab: { batterId: 14, notation: 'E6', outNumber: null,
          pitchSequence: mkPitches([['S',94,'FF'],['X',89,'SL']]),
          cumulativeRunners: mkRunners(14, 1), result: { rbi: 0 } },
      },
      sacfly: {
        label: 'Sac Fly (SF8)',
        ab: { batterId: 15, notation: 'SF8', outNumber: 1,
          pitchSequence: mkPitches([['B',92,'FF'],['X',88,'CH']]),
          cumulativeRunners: [], result: { rbi: 1 } },
      },
      dp: {
        label: 'Double Play (DP643)',
        ab: { batterId: 16, notation: 'DP643', outNumber: 3,
          pitchSequence: mkPitches([['B',93,'FF'],['X',91,'SI']]),
          cumulativeRunners: [], result: { rbi: 0 } },
      },
    };

    const keys = show ? show.split(',') : Object.keys(all);

    for (const key of keys) {
      const ex = all[key];
      if (!ex) continue;

      const item = document.createElement('div');
      item.className = 'example-item';

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', W);
      svg.setAttribute('height', H);
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

      // Cell background
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('width', W);
      rect.setAttribute('height', H);
      rect.setAttribute('fill', CLR.cellBg);
      rect.setAttribute('stroke', CLR.grid);
      rect.setAttribute('stroke-width', '1');
      svg.appendChild(rect);

      try {
        drawAtBatCell(svg, CLR, ex.ab, 0, 0, false);
      } catch (e) {
        console.error(key, e);
        const errDiv = document.createElement('div');
        errDiv.style.cssText = 'color:red;font-size:10px;max-width:200px;word-break:break-all;';
        errDiv.textContent = key + ': ' + e.message;
        item.appendChild(errDiv);
      }

      item.appendChild(svg);

      const label = document.createElement('div');
      label.className = 'example-label';
      label.textContent = ex.label;
      item.appendChild(label);

      root.appendChild(item);
    }
  </script>
</body>
</html>
