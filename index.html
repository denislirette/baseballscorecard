<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaseballScorecard.org, Live MLB Scorecards</title>
  <meta name="description" content="Live MLB scorecards rendered as traditional SVG scoring sheets. Follow every pitch, at-bat, and substitution for today's games.">
  <meta property="og:title" content="BaseballScorecard.org">
  <meta property="og:description" content="Live MLB scorecards rendered as traditional SVG scoring sheets. Follow every pitch, at-bat, and substitution for today's games.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://baseballscorecard.org/">
  <meta property="og:image" content="https://baseballscorecard.org/img/social.jpg">
  <meta property="og:image:width" content="2400">
  <meta property="og:image:height" content="1260">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="BaseballScorecard.org">
  <meta name="twitter:description" content="Live MLB scorecards rendered as traditional SVG scoring sheets. Follow every pitch, at-bat, and substitution for today's games.">
  <meta name="twitter:image" content="https://baseballscorecard.org/img/social.jpg">
  <link rel="canonical" href="https://baseballscorecard.org/">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "BaseballScorecard.org",
    "url": "https://baseballscorecard.org/",
    "description": "Live MLB scorecards rendered as traditional SVG scoring sheets. Follow every pitch, at-bat, and substitution for today's games.",
    "inLanguage": "en"
  }
  </script>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>
<body>
  <header class="app-header">
    <h1>BaseballScorecard.org</h1>
    <button class="header-btn" id="theme-toggle" aria-label="Toggle dark mode"></button>
  </header>

  <main class="game-picker">
    <div class="date-delay-row">
      <div class="date-nav" role="group" aria-label="Date navigation">
        <button id="prev-day" class="date-btn" aria-label="Previous day">&#9664;</button>
        <div id="date-picker"></div>
        <button id="next-day" class="date-btn" aria-label="Next day">&#9654;</button>
      </div>
      <div class="delay-bar" id="delay-bar">
        <button id="delay-toggle" class="delay-btn-toggle" aria-label="Toggle stream delay">Delay Off</button>
        <button class="delay-btn-step" id="delay-minus" aria-label="Decrease delay">&#8722;</button>
        <input type="text" id="delay-seconds" class="delay-input" value="15s" aria-label="Delay in seconds">
        <button class="delay-btn-step" id="delay-plus" aria-label="Increase delay">+</button>
      </div>
    </div>

    <div id="games-grid" class="games-grid">
      <p class="loading">Loading games...</p>
    </div>
  </main>

  <script type="module" src="/js/schedule.js"></script>
  <script type="module" src="/js/nav.js"></script>
</body>
</html>
