<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaseballScorecard.org</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>
<body>
  <header class="app-header">
    <h1>BaseballScorecard.org</h1>
    <button class="header-btn" id="theme-toggle" aria-label="Toggle dark mode"></button>
  </header>

  <main class="game-picker">
    <div class="date-nav" role="group" aria-label="Date navigation">
      <button id="prev-day" class="date-btn" aria-label="Previous day">&#9664;</button>

      <div id="date-picker"></div>

      <button id="next-day" class="date-btn" aria-label="Next day">&#9654;</button>
    </div>

    <div id="games-grid" class="games-grid">
      <p class="loading">Loading games...</p>
    </div>
  </main>

  <script type="module" src="/js/schedule.js"></script>
  <script type="module" src="/js/nav.js"></script>
  <script type="module" src="/js/theme.js"></script>
</body>
</html>
