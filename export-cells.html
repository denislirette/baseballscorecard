<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>◆ Export Cell SVGs for Figma</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="css/style.css">
<style>
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 24px; }
  button { padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px; background: #0066FF; color: white; border: none; border-radius: 6px; }
  button:hover { background: #0052CC; }
  .status { margin-top: 16px; font-size: 14px; color: var(--text-secondary); }
  pre { background: var(--surface); padding: 12px; border-radius: 4px; font-size: 13px; max-height: 300px; overflow: auto; }
</style>
</head>
<body>
<h1>Export Scorecard Cells as SVG</h1>
<p>Downloads a ZIP of individual SVG files, one per cell state. Import them into Figma as editable vectors.</p>
<button id="export-btn">Download All SVGs (.zip)</button>
<button id="export-single">Download as Single Figma Page SVG</button>
<div class="status" id="status"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script type="module">
import { getConfig } from './js/layout-config.js';

const SVG_NS = 'http://www.w3.org/2000/svg';
const c = getConfig();
const L = {
  COL_WIDTH: c.COL_WIDTH, ROW_HEIGHT: c.ROW_HEIGHT, DIAMOND_R: c.DIAMOND_R,
  PITCH_COL_W: c.PITCH_COL_W, PITCH_START_Y: c.PITCH_START_Y, PITCH_STEP: c.PITCH_STEP,
  PITCH_FONT_SIZE: c.PITCH_FONT_SIZE, SZ_WIDTH: c.SZ_WIDTH, SZ_HEIGHT: c.SZ_HEIGHT,
  FONT: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
  MONO: '"SF Mono", "Menlo", "Monaco", "Courier New", monospace',
  BASES: {
    HP: { dx: 0, dy: c.DIAMOND_R }, '1B': { dx: c.DIAMOND_R, dy: 0 },
    '2B': { dx: 0, dy: -c.DIAMOND_R }, '3B': { dx: -c.DIAMOND_R, dy: 0 },
  },
};

// Hard-coded light theme colors (for Figma export consistency)
const CLR = {
  text: '#000000', textLight: '#333333', textMuted: '#555555',
  grid: '#777777', gridBold: '#000000', diamond: '#333333',
  reached: '#000000', scored: '#006600', out: '#CC0000', hit: '#006600',
  sub: '#0000CC', bg: '#FFFFFF', cellBg: '#FFFFFF', headerBg: '#EEEEEE',
  activeCell: '#FFFACD',
  pitchBall: '#000000', pitchStrike: '#CC0000', pitchInPlay: '#0000CC', pitchHbp: '#000000',
};

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}
function svgText(text, x, y, attrs = {}) {
  const el = svgEl('text', { x, y, ...attrs });
  el.textContent = text;
  return el;
}
function pitchColor(callCode) {
  switch (callCode) {
    case 'C': case 'S': case 'F': case 'T': case 'W': case 'L': case 'M': case 'Q': return CLR.pitchStrike;
    case 'X': case 'D': case 'E': return CLR.pitchInPlay;
    case 'H': return CLR.pitchHbp;
    default: return CLR.pitchBall;
  }
}
function baseCoords(cx, cy, baseName) {
  const b = L.BASES[baseName] || L.BASES.HP;
  return { x: cx + b.dx, y: cy + b.dy };
}
function computeCount(pitches) {
  let balls = 0, strikes = 0;
  for (const p of pitches) {
    if (p.callCode === 'B' || p.callCode === '*') balls++;
    else if (['C','S','W','T'].includes(p.callCode)) { if (strikes < 2) strikes++; }
    else if (p.callCode === 'F') { if (strikes < 2) strikes++; }
  }
  return `${balls}-${strikes}`;
}
function mkPitch(callCode, typeCode, pX, pZ) {
  return { callCode, typeCode, pX: pX ?? null, pZ: pZ ?? null };
}

function buildCellSVG({ pitches, notation, runners, isHR, bgFill, subIndicator }) {
  const W = L.COL_WIDTH, H = L.ROW_HEIGHT;
  const svg = svgEl('svg', { xmlns: SVG_NS, viewBox: `0 0 ${W} ${H}`, width: W, height: H });

  // Background
  svg.appendChild(svgEl('rect', { x: 0, y: 0, width: W, height: H, fill: bgFill || CLR.cellBg, stroke: CLR.gridBold, 'stroke-width': 2 }));
  // Pitch column divider
  svg.appendChild(svgEl('line', { x1: L.PITCH_COL_W, y1: 1, x2: L.PITCH_COL_W, y2: H - 1, stroke: CLR.grid, 'stroke-width': 1 }));

  // Pitch sequence
  if (pitches && pitches.length > 0) {
    const maxRows = Math.floor((H - L.SZ_HEIGHT - 16) / L.PITCH_STEP);
    const useTwoCols = pitches.length > maxRows;
    for (let i = 0; i < pitches.length; i++) {
      const pitch = pitches[i];
      const color = pitchColor(pitch.callCode);
      const label = pitch.typeCode || pitch.callCode;
      let px, py;
      if (useTwoCols) {
        const colLen = Math.ceil(pitches.length / 2);
        const col = i < colLen ? 0 : 1;
        const row = col === 0 ? i : i - colLen;
        px = 3 + col * 30; py = L.PITCH_START_Y + row * L.PITCH_STEP;
      } else {
        px = 3; py = L.PITCH_START_Y + i * L.PITCH_STEP;
      }
      svg.appendChild(svgText(label, px, py + L.PITCH_FONT_SIZE, {
        'font-size': String(L.PITCH_FONT_SIZE), 'font-weight': '700', 'font-family': L.MONO, fill: color,
      }));
    }
    // Mini strike zone
    const zoneX = 18, zoneY = H - L.SZ_HEIGHT - 8;
    const SZ_HP = 0.83, PXR = 3.0, PZN = 0.5, PZX = 4.5;
    const mapPX = (pX) => zoneX + ((pX + PXR / 2) / PXR) * L.SZ_WIDTH;
    const mapPZ = (pZ) => zoneY + (1 - (pZ - PZN) / (PZX - PZN)) * L.SZ_HEIGHT;
    svg.appendChild(svgEl('rect', { x: mapPX(-SZ_HP), y: mapPZ(3.4), width: mapPX(SZ_HP) - mapPX(-SZ_HP), height: mapPZ(1.6) - mapPZ(3.4), fill: 'none', stroke: CLR.grid, 'stroke-width': 0.75 }));
    for (const pitch of pitches) {
      if (pitch.pX == null || pitch.pZ == null) continue;
      svg.appendChild(svgEl('rect', { x: mapPX(pitch.pX) - 1.5, y: mapPZ(pitch.pZ) - 1.5, width: 3, height: 3, fill: pitchColor(pitch.callCode) }));
    }
    // Count
    svg.appendChild(svgText(computeCount(pitches), L.PITCH_COL_W + 8, 18, {
      'font-size': '16', 'font-weight': '700', 'font-family': L.FONT, fill: CLR.textLight,
    }));
  }

  // Diamond
  const mainW = W - L.PITCH_COL_W, cx = L.PITCH_COL_W + mainW / 2, cy = H * 0.45;
  const hp = baseCoords(cx, cy, 'HP'), b1 = baseCoords(cx, cy, '1B'), b2 = baseCoords(cx, cy, '2B'), b3 = baseCoords(cx, cy, '3B');
  svg.appendChild(svgEl('polygon', {
    points: `${hp.x},${hp.y} ${b1.x},${b1.y} ${b2.x},${b2.y} ${b3.x},${b3.y}`,
    fill: isHR ? CLR.text : 'none', stroke: CLR.text, 'stroke-width': 2.5,
  }));

  // Base paths
  if (runners) {
    const order = ['HP', '1B', '2B', '3B'];
    for (const runner of runners) {
      const start = runner.start || 'HP', end = runner.end;
      if (!end) continue;
      const endBase = end === 'score' ? 'HP' : end;
      const isScore = end === 'score';
      let si = order.indexOf(start); if (si === -1) si = 0;
      let numSegs;
      if (isScore) numSegs = 4 - si;
      else { let ei = order.indexOf(endBase); if (ei === -1) ei = 0; numSegs = ei - si; if (numSegs <= 0) continue; }
      for (let n = 0; n < numSegs; n++) {
        const i = (si + n) % 4;
        const from = baseCoords(cx, cy, order[i]), to = baseCoords(cx, cy, order[(i + 1) % 4]);
        svg.appendChild(svgEl('line', { x1: from.x, y1: from.y, x2: to.x, y2: to.y, stroke: CLR.text, 'stroke-width': 5, 'stroke-linecap': 'round' }));
      }
      if (!runner.isOut && end !== 'score') {
        const pos = baseCoords(cx, cy, end);
        svg.appendChild(svgEl('circle', { cx: pos.x, cy: pos.y, r: 6, fill: CLR.text }));
      }
    }
  }

  // Notation
  if (notation) {
    const notColor = isHR ? CLR.cellBg : CLR.text;
    const len = notation.length;
    const fs = len <= 2 ? '28' : len <= 4 ? '24' : len <= 6 ? '20' : '16';
    svg.appendChild(svgText(notation, cx, cy, {
      'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-size': fs, 'font-weight': '900', 'font-family': L.MONO, fill: notColor,
    }));
  }

  // Runner annotations
  if (runners) {
    const offset = L.DIAMOND_R + 18;
    for (const runner of runners) {
      if (!runner.start || !runner.end || runner.end === runner.start) continue;
      const sb = (b) => !b ? '?' : b === 'score' ? 'H' : ({ '1B':'1','2B':'2','3B':'3' }[b] || b);
      const text = `${sb(runner.start)}-${sb(runner.end)}`;
      const startBase = runner.start || 'HP';
      let ax, ay, anchor;
      if (startBase === 'HP') { ax = cx + offset*0.7; ay = cy + offset*0.3; anchor = 'start'; }
      else if (startBase === '1B') { ax = cx + offset*0.7; ay = cy - offset*0.3; anchor = 'start'; }
      else if (startBase === '2B') { ax = cx - offset*0.7; ay = cy - offset*0.3; anchor = 'end'; }
      else { ax = cx - offset*0.7; ay = cy + offset*0.3; anchor = 'end'; }
      svg.appendChild(svgText(text, ax, ay, {
        'text-anchor': anchor, 'font-size': '16', 'font-weight': '800', 'font-family': L.MONO, fill: CLR.text,
      }));
    }
  }

  // Sub indicators
  if (subIndicator) {
    const cr = 7;
    if (subIndicator === 'pitcher') {
      svg.appendChild(svgEl('line', { x1: 0, y1: 0, x2: W, y2: 0, stroke: CLR.sub, 'stroke-width': 5, 'stroke-dasharray': '10,6' }));
    } else if (subIndicator === 'PH') {
      svg.appendChild(svgEl('line', { x1: 0, y1: 0, x2: 0, y2: H, stroke: CLR.sub, 'stroke-width': 5 }));
      svg.appendChild(svgEl('circle', { cx: cr+3, cy: H-cr-3, r: cr, fill: CLR.cellBg, stroke: CLR.sub, 'stroke-width': 1.5 }));
      svg.appendChild(svgText('1', cr+3, H-cr-3, { 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '10', 'font-weight': '700', 'font-family': L.MONO, fill: CLR.sub }));
    } else if (subIndicator === 'PR') {
      svg.appendChild(svgEl('line', { x1: W, y1: 0, x2: W, y2: H, stroke: CLR.sub, 'stroke-width': 5 }));
      svg.appendChild(svgEl('circle', { cx: W-cr-3, cy: H-cr-3, r: cr, fill: CLR.cellBg, stroke: CLR.sub, 'stroke-width': 1.5 }));
      svg.appendChild(svgText('1', W-cr-3, H-cr-3, { 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '10', 'font-weight': '700', 'font-family': L.MONO, fill: CLR.sub }));
    }
  }

  return svg;
}

// --- All cell states ---
const allCells = [
  // Batting outcomes
  { name: '01-strikeout-swinging', opts: { pitches: [mkPitch('C','FF',0.2,2.5), mkPitch('S','SL',-0.5,1.8), mkPitch('S','CH',0.1,1.5)], notation: 'K' } },
  { name: '02-strikeout-looking', opts: { pitches: [mkPitch('B','FF',-1.2,2.0), mkPitch('F','SL',0.3,2.8), mkPitch('C','CU',0.0,2.0)], notation: '\u{A4D8}' } },
  { name: '03-walk', opts: { pitches: [mkPitch('B','FF',-1,3.5), mkPitch('C','SL',0.2,2.5), mkPitch('B','CH',1.2,1.0), mkPitch('B','FF',-1.1,3.8), mkPitch('B','SI',1.3,1.2)], notation: 'BB' } },
  { name: '04-intentional-walk', opts: { pitches: [mkPitch('B','FF',-1,2), mkPitch('B','FF',-1,2), mkPitch('B','FF',-1,2), mkPitch('B','FF',-1,2)], notation: 'IBB' } },
  { name: '05-hit-by-pitch', opts: { pitches: [mkPitch('B','FF',-1,2), mkPitch('H','SI',0.8,2.5)], notation: 'HBP' } },
  { name: '06-catcher-interference', opts: { pitches: [mkPitch('X','FF',0.2,2.5)], notation: 'CI' } },

  // Hits
  { name: '10-single', opts: { pitches: [mkPitch('B','FF',-1,3), mkPitch('C','SL',0.3,2.2), mkPitch('F','FF',0.5,2.8), mkPitch('X','CH',-0.2,2.0)], notation: '1B', runners: [{ start:'HP', end:'1B' }] } },
  { name: '11-double', opts: { pitches: [mkPitch('B','CU',-0.8,1.0), mkPitch('X','FF',0.1,2.5)], notation: '2B', runners: [{ start:'HP', end:'2B' }] } },
  { name: '12-triple', opts: { pitches: [mkPitch('C','FF',0.0,2.8), mkPitch('X','SI',-0.3,2.2)], notation: '3B', runners: [{ start:'HP', end:'3B' }] } },
  { name: '13-home-run', opts: { pitches: [mkPitch('B','SL',-1,1.5), mkPitch('S','FF',0.2,3.0), mkPitch('X','FF',0.4,2.8)], notation: 'HR', isHR: true, runners: [{ start:'HP', end:'score' }] } },

  // Outs
  { name: '20-groundout-63', opts: { pitches: [mkPitch('X','SI',0.0,1.8)], notation: 'G63' } },
  { name: '21-flyout-F8', opts: { pitches: [mkPitch('B','FF',1.2,3.5), mkPitch('F','SL',-0.3,2.0), mkPitch('X','FF',0.5,2.5)], notation: 'F8' } },
  { name: '22-lineout-L7', opts: { pitches: [mkPitch('B','FF',1.2,3.5), mkPitch('F','SL',-0.3,2.0), mkPitch('X','FF',0.5,2.5)], notation: 'L7' } },
  { name: '23-popout-P4', opts: { pitches: [mkPitch('X','SI',0.0,1.8)], notation: 'P4' } },
  { name: '24-double-play', opts: { pitches: [mkPitch('B','CH',-1,1.2), mkPitch('X','SI',-0.1,1.6)], notation: 'G643', runners: [{ start:'1B', end:'2B', isOut:true }] } },
  { name: '25-sac-fly', opts: { pitches: [mkPitch('C','FF',0.3,2.8), mkPitch('B','SL',-1,1.0), mkPitch('X','FF',0.4,3.0)], notation: 'SF9', runners: [{ start:'3B', end:'score' }] } },
  { name: '26-sac-bunt', opts: { pitches: [mkPitch('X','FF',0.0,2.5)], notation: 'SH13', runners: [{ start:'1B', end:'2B' }] } },
  { name: '27-fielders-choice', opts: { pitches: [mkPitch('X','SI',0.0,1.8)], notation: 'FC', runners: [{ start:'HP', end:'1B' }, { start:'1B', end:'2B', isOut:true }] } },
  { name: '28-error', opts: { pitches: [mkPitch('C','CU',0.2,2.8), mkPitch('X','FF',0.1,2.0)], notation: 'E6', runners: [{ start:'HP', end:'1B' }] } },

  // Runner movement
  { name: '30-single-runner-1st-to-3rd', opts: { pitches: [mkPitch('B','FF',-1,3), mkPitch('X','CH',-0.2,2.0)], notation: '1B', runners: [{ start:'HP', end:'1B' }, { start:'1B', end:'3B' }] } },
  { name: '31-single-runner-scores', opts: { pitches: [mkPitch('B','FF',-1,3), mkPitch('X','CH',-0.2,2.0)], notation: '1B', runners: [{ start:'HP', end:'1B' }, { start:'2B', end:'score' }] } },
  { name: '32-double-2-runners-score', opts: { pitches: [mkPitch('X','FF',0.1,2.5)], notation: '2B', runners: [{ start:'HP', end:'2B' }, { start:'1B', end:'score' }, { start:'3B', end:'score' }] } },
  { name: '33-grand-slam', opts: { pitches: [mkPitch('B','SL',-1,1.5), mkPitch('X','FF',0.4,2.8)], notation: 'HR', isHR: true, runners: [{ start:'HP', end:'score' }, { start:'1B', end:'score' }, { start:'2B', end:'score' }, { start:'3B', end:'score' }] } },

  // Subs
  { name: '40-pinch-hitter', opts: { pitches: [mkPitch('B','FF',-1,3), mkPitch('C','SL',0.3,2.2), mkPitch('X','CH',-0.2,2.0)], notation: '1B', runners: [{ start:'HP', end:'1B' }], subIndicator: 'PH' } },
  { name: '41-pinch-runner', opts: { pitches: [mkPitch('B','FF',-1,3), mkPitch('C','SL',0.3,2.2), mkPitch('X','CH',-0.2,2.0)], notation: '1B', runners: [{ start:'HP', end:'1B' }], subIndicator: 'PR' } },
  { name: '42-pitching-sub', opts: { pitches: [mkPitch('C','FF',0.2,2.5), mkPitch('S','SL',-0.5,1.8), mkPitch('S','CH',0.1,1.5)], notation: 'K', subIndicator: 'pitcher' } },

  // Special
  { name: '50-empty', opts: {} },
  { name: '51-active-batter', opts: { bgFill: CLR.activeCell } },
  { name: '52-long-at-bat', opts: { pitches: [mkPitch('B','FF',-1,3.5), mkPitch('C','SL',0.3,2.5), mkPitch('F','FF',0.5,2.8), mkPitch('F','CU',-0.2,2.0), mkPitch('B','CH',1.2,1.0), mkPitch('F','FF',0.4,3.0), mkPitch('F','SL',-0.5,1.8), mkPitch('B','SI',-1.1,3.2), mkPitch('X','FF',0.1,2.5)], notation: '1B', runners: [{ start:'HP', end:'1B' }] } },
];

function svgToString(svgEl) {
  const s = new XMLSerializer();
  let str = s.serializeToString(svgEl);
  // Ensure xmlns
  if (!str.includes('xmlns="http://www.w3.org/2000/svg"')) {
    str = str.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
  }
  return '<?xml version="1.0" encoding="UTF-8"?>\n' + str;
}

// Export as ZIP of individual SVGs
document.getElementById('export-btn').addEventListener('click', async () => {
  const status = document.getElementById('status');
  status.textContent = 'Generating SVGs...';

  const zip = new JSZip();
  for (const cell of allCells) {
    const svg = buildCellSVG(cell.opts);
    zip.file(`${cell.name}.svg`, svgToString(svg));
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'scorecard-cells.zip';
  a.click();
  URL.revokeObjectURL(a.href);
  status.textContent = `Done! ${allCells.length} SVG files exported.`;
});

// Export as single SVG with all cells laid out (easier Figma import)
document.getElementById('export-single').addEventListener('click', () => {
  const status = document.getElementById('status');
  const cols = 6;
  const pad = 24;
  const labelH = 32;
  const cellW = L.COL_WIDTH;
  const cellH = L.ROW_HEIGHT;
  const rows = Math.ceil(allCells.length / cols);
  const totalW = cols * (cellW + pad) + pad;
  const totalH = rows * (cellH + labelH + pad) + pad;

  const svg = svgEl('svg', { xmlns: SVG_NS, viewBox: `0 0 ${totalW} ${totalH}`, width: totalW, height: totalH });
  svg.appendChild(svgEl('rect', { x: 0, y: 0, width: totalW, height: totalH, fill: '#F5F5F5' }));

  allCells.forEach((cell, idx) => {
    const col = idx % cols;
    const row = Math.floor(idx / cols);
    const x = pad + col * (cellW + pad);
    const y = pad + row * (cellH + labelH + pad);

    // Label
    svg.appendChild(svgText(cell.name, x + cellW / 2, y + cellH + 20, {
      'text-anchor': 'middle', 'font-size': '11', 'font-weight': '600',
      'font-family': L.FONT, fill: '#666666',
    }));

    // Cell as nested SVG
    const cellSvg = buildCellSVG(cell.opts);
    cellSvg.setAttribute('x', x);
    cellSvg.setAttribute('y', y);
    svg.appendChild(cellSvg);
  });

  const str = svgToString(svg);
  const blob = new Blob([str], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'scorecard-cells-all.svg';
  a.click();
  URL.revokeObjectURL(a.href);
  status.textContent = 'Done! Single SVG with all cells exported.';
});
</script>
</body>
</html>
