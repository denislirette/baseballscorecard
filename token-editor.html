<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>◆ Design Token Editor</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="css/style.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; }

  /* ── Editor panel (left) ── */
  .editor {
    width: 340px; min-width: 340px;
    background: var(--surface);
    border-right: 2px solid var(--grid-line);
    overflow-y: auto;
    padding: 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .editor h1 { font-size: 16px; margin-bottom: 8px; }
  .editor h2 {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-secondary); margin-top: 16px; margin-bottom: 6px;
    border-bottom: 1px solid var(--grid-line); padding-bottom: 4px;
  }
  .token-row {
    display: flex; align-items: center; gap: 8px; padding: 3px 0;
  }
  .token-row label {
    flex: 1; font-size: 12px; font-family: "SF Mono", Menlo, monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .token-row input[type="color"] {
    width: 32px; height: 24px; border: 1px solid var(--grid-line);
    border-radius: 3px; cursor: pointer; padding: 0;
  }
  .token-row input[type="number"] {
    width: 64px; padding: 3px 6px; border: 1px solid var(--grid-line);
    border-radius: 3px; background: var(--card-bg); color: var(--text);
    font-size: 13px; font-family: "SF Mono", Menlo, monospace;
  }
  .token-row .hex-val {
    font-size: 11px; font-family: "SF Mono", Menlo, monospace;
    color: var(--text-secondary); width: 64px;
  }

  .btn-bar {
    display: flex; gap: 8px; margin-top: 12px; position: sticky; bottom: 0;
    background: var(--surface); padding: 12px 0 4px; border-top: 1px solid var(--grid-line);
  }
  .btn-bar button {
    flex: 1; padding: 8px; border: none; border-radius: 4px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-save { background: #0066FF; color: white; }
  .btn-save:hover { background: #0052CC; }
  .btn-reset { background: var(--card-bg); color: var(--text); border: 1px solid var(--grid-line) !important; }
  .btn-reset:hover { background: var(--grid-line); }
  .btn-save:disabled { opacity: 0.5; cursor: default; }
  .save-status { font-size: 12px; color: var(--text-secondary); text-align: center; min-height: 18px; }

  .mode-toggle {
    display: flex; gap: 0; margin-bottom: 12px; border-radius: 4px; overflow: hidden;
    border: 1px solid var(--grid-line);
  }
  .mode-toggle button {
    flex: 1; padding: 6px; border: none; background: var(--card-bg);
    color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .mode-toggle button.active { background: var(--sc-sub); color: white; }

  /* ── Preview (right) ── */
  .preview {
    flex: 1; overflow: auto; padding: 24px;
    background: var(--bg);
  }
  .preview h2 {
    font-size: 16px; margin: 24px 0 8px;
    border-bottom: 2px solid var(--grid-line); padding-bottom: 4px;
  }
  .preview h2:first-child { margin-top: 0; }
  .grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .cell-card { display: flex; flex-direction: column; align-items: center; }
  .cell-card .label { font-size: 11px; font-weight: 600; margin-top: 4px; color: var(--text-secondary); text-align: center; max-width: 240px; }
</style>
</head>
<body>

<div class="editor" id="editor">
  <h1>Token Editor</h1>
  <div class="mode-toggle">
    <button class="active" data-mode="light">Light</button>
    <button data-mode="dark">Dark</button>
  </div>
  <div id="controls"></div>
  <div class="btn-bar">
    <button class="btn-reset" id="btn-reset">Reset</button>
    <button class="btn-save" id="btn-save">Save to File</button>
  </div>
  <div class="save-status" id="save-status"></div>
</div>

<div class="preview" id="preview"></div>

<script type="module">
import { getConfig, updateConfig } from './js/layout-config.js';

const SVG_NS = 'http://www.w3.org/2000/svg';

// ── State ───────────────────────────────────────────────────────

let tokens = null;
let originalTokens = null;
let currentMode = 'light';
let dirty = false;

async function loadTokens() {
  const res = await fetch('/api/tokens');
  tokens = await res.json();
  originalTokens = JSON.parse(JSON.stringify(tokens));
}

// ── Controls builder ────────────────────────────────────────────

function buildControls() {
  const el = document.getElementById('controls');
  el.innerHTML = '';

  // Colors
  const colors = tokens.scorecard.colors[currentMode];
  const h2c = document.createElement('h2');
  h2c.textContent = `Colors (${currentMode})`;
  el.appendChild(h2c);

  for (const [key, token] of Object.entries(colors)) {
    const row = document.createElement('div');
    row.className = 'token-row';

    const label = document.createElement('label');
    label.textContent = token.description;
    label.title = key;

    const input = document.createElement('input');
    input.type = 'color';
    input.value = token.value;
    input.dataset.section = 'colors';
    input.dataset.mode = currentMode;
    input.dataset.key = key;

    const hex = document.createElement('span');
    hex.className = 'hex-val';
    hex.textContent = token.value;

    input.addEventListener('input', () => {
      token.value = input.value;
      hex.textContent = input.value;
      markDirty();
      applyLive();
    });

    row.appendChild(label);
    row.appendChild(input);
    row.appendChild(hex);
    el.appendChild(row);
  }

  // Sizing
  const h2s = document.createElement('h2');
  h2s.textContent = 'Sizing';
  el.appendChild(h2s);

  for (const [key, token] of Object.entries(tokens.scorecard.sizing)) {
    const row = document.createElement('div');
    row.className = 'token-row';

    const label = document.createElement('label');
    label.textContent = token.description;
    label.title = key;

    const input = document.createElement('input');
    input.type = 'number';
    input.value = token.value;
    input.step = key.includes('Width') || key.includes('Height') || key.includes('Radius') ? 5 : 1;

    input.addEventListener('input', () => {
      token.value = Number(input.value);
      markDirty();
      applyLive();
    });

    row.appendChild(label);
    row.appendChild(input);
    el.appendChild(row);
  }

  // Strokes
  const h2st = document.createElement('h2');
  h2st.textContent = 'Strokes';
  el.appendChild(h2st);

  for (const [key, token] of Object.entries(tokens.scorecard.strokes)) {
    const row = document.createElement('div');
    row.className = 'token-row';

    const label = document.createElement('label');
    label.textContent = key;

    const input = document.createElement('input');
    input.type = 'number';
    input.value = token.value;
    input.step = 0.5;
    input.min = 0;

    input.addEventListener('input', () => {
      token.value = Number(input.value);
      markDirty();
      applyLive();
    });

    row.appendChild(label);
    row.appendChild(input);
    el.appendChild(row);
  }

  // Typography
  const h2t = document.createElement('h2');
  h2t.textContent = 'Typography';
  el.appendChild(h2t);

  for (const [group, groupTokens] of Object.entries(tokens.scorecard.typography)) {
    for (const [key, token] of Object.entries(groupTokens)) {
      if (token.type === 'fontFamilies') continue; // skip font family editing for now
      const row = document.createElement('div');
      row.className = 'token-row';

      const label = document.createElement('label');
      label.textContent = `${group}.${key}`;

      const input = document.createElement('input');
      input.type = 'number';
      input.value = token.value;
      input.step = 1;

      input.addEventListener('input', () => {
        token.value = input.value;
        markDirty();
        applyLive();
      });

      row.appendChild(label);
      row.appendChild(input);
      el.appendChild(row);
    }
  }
}

// ── Live preview ────────────────────────────────────────────────

function applyLive() {
  // Apply colors to CSS vars
  const colors = tokens.scorecard.colors[currentMode];
  const root = document.documentElement;
  for (const token of Object.values(colors)) {
    root.style.setProperty(token.description, token.value);
  }

  // Apply sizing to layout config
  const sizing = {};
  for (const token of Object.values(tokens.scorecard.sizing)) {
    sizing[token.description] = token.value;
  }
  updateConfig(sizing);

  renderPreview();
}

function markDirty() {
  dirty = true;
  document.getElementById('btn-save').disabled = false;
  document.getElementById('save-status').textContent = 'Unsaved changes';
}

// ── Save ────────────────────────────────────────────────────────

async function save() {
  const btn = document.getElementById('btn-save');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  status.textContent = 'Saving...';

  try {
    const res = await fetch('/api/save-tokens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(tokens, null, 2),
    });
    const data = await res.json();
    if (data.ok) {
      status.textContent = 'Saved + synced to CSS & layout-config.js';
      dirty = false;
      originalTokens = JSON.parse(JSON.stringify(tokens));
    } else {
      status.textContent = 'Error: ' + data.error;
      btn.disabled = false;
    }
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    btn.disabled = false;
  }
}

function reset() {
  tokens = JSON.parse(JSON.stringify(originalTokens));
  dirty = false;
  document.getElementById('btn-save').disabled = true;
  document.getElementById('save-status').textContent = 'Reset to last saved';
  buildControls();
  applyLive();
}

// ── SVG rendering (cell preview) ────────────────────────────────

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}
function svgText(text, x, y, attrs = {}) {
  const el = svgEl('text', { x, y, ...attrs });
  el.textContent = text;
  return el;
}

function getCLR() {
  const colors = tokens.scorecard.colors[currentMode];
  const clr = {};
  for (const [key, token] of Object.entries(colors)) clr[key] = token.value;
  return clr;
}

function pitchColor(callCode, CLR) {
  switch (callCode) {
    case 'C': case 'S': case 'F': case 'T': case 'W': case 'L': case 'M': case 'Q': return CLR.pitchStrike;
    case 'X': case 'D': case 'E': return CLR.pitchInPlay;
    case 'H': return CLR.pitchHbp;
    default: return CLR.pitchBall;
  }
}

function baseCoords(cx, cy, baseName, R) {
  const bases = { HP: { dx: 0, dy: R }, '1B': { dx: R, dy: 0 }, '2B': { dx: 0, dy: -R }, '3B': { dx: -R, dy: 0 } };
  const b = bases[baseName] || bases.HP;
  return { x: cx + b.dx, y: cy + b.dy };
}

function computeCount(pitches) {
  let balls = 0, strikes = 0;
  for (const p of pitches) {
    if (p.c === 'B' || p.c === '*') balls++;
    else if (['C','S','W','T'].includes(p.c)) { if (strikes < 2) strikes++; }
    else if (p.c === 'F') { if (strikes < 2) strikes++; }
  }
  return `${balls}-${strikes}`;
}

function renderCell(CLR, { pitches, notation, runners, isHR, bgFill, subIndicator }) {
  const c = getConfig();
  const W = c.COL_WIDTH, H = c.ROW_HEIGHT, R = c.DIAMOND_R;
  const PCW = c.PITCH_COL_W, PSY = c.PITCH_START_Y, PS = c.PITCH_STEP, PFS = c.PITCH_FONT_SIZE;
  const SZW = c.SZ_WIDTH, SZH = c.SZ_HEIGHT;
  const strokes = tokens.scorecard.strokes;
  const typo = tokens.scorecard.typography;

  const MONO = '"SF Mono", Menlo, Monaco, "Courier New", monospace';
  const FONT = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';

  const svg = svgEl('svg', { viewBox: `0 0 ${W} ${H}`, width: W, height: H });

  svg.appendChild(svgEl('rect', { x: 0, y: 0, width: W, height: H, fill: bgFill || CLR.cellBg, stroke: CLR.gridBold, 'stroke-width': strokes.gridBold.value }));
  svg.appendChild(svgEl('line', { x1: PCW, y1: 1, x2: PCW, y2: H - 1, stroke: CLR.grid, 'stroke-width': strokes.pitchDivider.value }));

  if (pitches && pitches.length > 0) {
    const maxRows = Math.floor((H - SZH - 16) / PS);
    const useTwoCols = pitches.length > maxRows;
    for (let i = 0; i < pitches.length; i++) {
      const p = pitches[i];
      const color = pitchColor(p.c, CLR);
      let px, py;
      if (useTwoCols) {
        const colLen = Math.ceil(pitches.length / 2);
        const col = i < colLen ? 0 : 1;
        const row = col === 0 ? i : i - colLen;
        px = 3 + col * 30; py = PSY + row * PS;
      } else {
        px = 3; py = PSY + i * PS;
      }
      svg.appendChild(svgText(p.t || p.c, px, py + PFS, {
        'font-size': String(PFS), 'font-weight': typo.pitch.fontWeight.value, 'font-family': MONO, fill: color,
      }));
    }
    // Strike zone
    const zoneX = 18, zoneY = H - SZH - 8;
    const PXR = 3.0, PZN = 0.5, PZX = 4.5, SZ_HP = 0.83;
    const mapPX = (pX) => zoneX + ((pX + PXR/2) / PXR) * SZW;
    const mapPZ = (pZ) => zoneY + (1 - (pZ - PZN) / (PZX - PZN)) * SZH;
    svg.appendChild(svgEl('rect', { x: mapPX(-SZ_HP), y: mapPZ(3.4), width: mapPX(SZ_HP) - mapPX(-SZ_HP), height: mapPZ(1.6) - mapPZ(3.4), fill: 'none', stroke: CLR.grid, 'stroke-width': 0.75 }));
    for (const p of pitches) {
      if (p.px == null || p.pz == null) continue;
      svg.appendChild(svgEl('rect', { x: mapPX(p.px) - 1.5, y: mapPZ(p.pz) - 1.5, width: 3, height: 3, fill: pitchColor(p.c, CLR) }));
    }
    // Count
    svg.appendChild(svgText(computeCount(pitches), PCW + 8, 18, {
      'font-size': typo.count.fontSize.value, 'font-weight': typo.count.fontWeight.value, 'font-family': FONT, fill: CLR.textLight,
    }));
  }

  // Diamond
  const mainW = W - PCW, cx = PCW + mainW / 2, cy = H * 0.45;
  const hp = baseCoords(cx, cy, 'HP', R), b1 = baseCoords(cx, cy, '1B', R), b2 = baseCoords(cx, cy, '2B', R), b3 = baseCoords(cx, cy, '3B', R);
  svg.appendChild(svgEl('polygon', {
    points: `${hp.x},${hp.y} ${b1.x},${b1.y} ${b2.x},${b2.y} ${b3.x},${b3.y}`,
    fill: isHR ? CLR.text : 'none', stroke: CLR.text, 'stroke-width': strokes.diamond.value,
  }));

  // Runners
  if (runners) {
    const order = ['HP', '1B', '2B', '3B'];
    for (const runner of runners) {
      const start = runner.s || 'HP', end = runner.e;
      if (!end) continue;
      const endBase = end === 'score' ? 'HP' : end;
      let si = order.indexOf(start); if (si === -1) si = 0;
      const numSegs = end === 'score' ? 4 - si : order.indexOf(endBase) - si;
      if (numSegs <= 0 && end !== 'score') continue;
      for (let n = 0; n < numSegs; n++) {
        const i = (si + n) % 4;
        const from = baseCoords(cx, cy, order[i], R), to = baseCoords(cx, cy, order[(i+1)%4], R);
        svg.appendChild(svgEl('line', { x1: from.x, y1: from.y, x2: to.x, y2: to.y, stroke: CLR.text, 'stroke-width': strokes.basePath.value, 'stroke-linecap': 'round' }));
      }
      if (!runner.out && end !== 'score') {
        const pos = baseCoords(cx, cy, end, R);
        svg.appendChild(svgEl('circle', { cx: pos.x, cy: pos.y, r: 6, fill: CLR.text }));
      }
    }
  }

  // Notation
  if (notation) {
    const notColor = isHR ? CLR.cellBg : CLR.text;
    const len = notation.length;
    const sizes = typo.notation;
    const fs = len <= 2 ? sizes.xlarge.value : len <= 4 ? sizes.large.value : len <= 6 ? sizes.medium.value : sizes.small.value;
    svg.appendChild(svgText(notation, cx, cy, {
      'text-anchor': 'middle', 'dominant-baseline': 'central',
      'font-size': fs, 'font-weight': sizes.fontWeight.value, 'font-family': MONO, fill: notColor,
    }));
  }

  // Runner annotations
  if (runners) {
    const offset = R + 18;
    for (const runner of runners) {
      if (!runner.s || !runner.e || runner.e === runner.s) continue;
      const sb = (b) => !b ? '?' : b === 'score' ? 'H' : ({'1B':'1','2B':'2','3B':'3'}[b] || b);
      const text = `${sb(runner.s)}-${sb(runner.e)}`;
      let ax, ay, anchor;
      if (runner.s === 'HP') { ax = cx + offset*0.7; ay = cy + offset*0.3; anchor = 'start'; }
      else if (runner.s === '1B') { ax = cx + offset*0.7; ay = cy - offset*0.3; anchor = 'start'; }
      else if (runner.s === '2B') { ax = cx - offset*0.7; ay = cy - offset*0.3; anchor = 'end'; }
      else { ax = cx - offset*0.7; ay = cy + offset*0.3; anchor = 'end'; }
      svg.appendChild(svgText(text, ax, ay, {
        'text-anchor': anchor, 'font-size': typo.runner.fontSize.value, 'font-weight': typo.runner.fontWeight.value, 'font-family': MONO, fill: CLR.text,
      }));
    }
  }

  // Sub indicators
  if (subIndicator) {
    const cr = 7;
    if (subIndicator === 'pitcher') {
      svg.appendChild(svgEl('line', { x1: 0, y1: 0, x2: W, y2: 0, stroke: CLR.sub, 'stroke-width': strokes.subIndicator.value, 'stroke-dasharray': '10,6' }));
    } else if (subIndicator === 'PH') {
      svg.appendChild(svgEl('line', { x1: 0, y1: 0, x2: 0, y2: H, stroke: CLR.sub, 'stroke-width': strokes.subIndicator.value }));
      svg.appendChild(svgEl('circle', { cx: cr+3, cy: H-cr-3, r: cr, fill: CLR.cellBg, stroke: CLR.sub, 'stroke-width': 1.5 }));
      svg.appendChild(svgText('1', cr+3, H-cr-3, { 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '10', 'font-weight': '700', 'font-family': MONO, fill: CLR.sub }));
    } else if (subIndicator === 'PR') {
      svg.appendChild(svgEl('line', { x1: W, y1: 0, x2: W, y2: H, stroke: CLR.sub, 'stroke-width': strokes.subIndicator.value }));
      svg.appendChild(svgEl('circle', { cx: W-cr-3, cy: H-cr-3, r: cr, fill: CLR.cellBg, stroke: CLR.sub, 'stroke-width': 1.5 }));
      svg.appendChild(svgText('1', W-cr-3, H-cr-3, { 'text-anchor': 'middle', 'dominant-baseline': 'central', 'font-size': '10', 'font-weight': '700', 'font-family': MONO, fill: CLR.sub }));
    }
  }

  return svg;
}

// ── Sample data (compact) ───────────────────────────────────────

const P = (c, t, px, pz) => ({ c, t, px: px ?? null, pz: pz ?? null });

const samples = [
  { title: 'Batting Outcomes', cells: [
    { label: 'Strikeout', opts: { pitches: [P('C','FF',0.2,2.5), P('S','SL',-0.5,1.8), P('S','CH',0.1,1.5)], notation: 'K' } },
    { label: 'Called K', opts: { pitches: [P('B','FF',-1.2,2), P('F','SL',0.3,2.8), P('C','CU',0,2)], notation: '\u{A4D8}' } },
    { label: 'Walk', opts: { pitches: [P('B','FF',-1,3.5), P('C','SL',0.2,2.5), P('B','CH',1.2,1), P('B','FF',-1.1,3.8), P('B','SI',1.3,1.2)], notation: 'BB' } },
    { label: 'HBP', opts: { pitches: [P('B','FF',-1,2), P('H','SI',0.8,2.5)], notation: 'HBP' } },
  ]},
  { title: 'Hits', cells: [
    { label: 'Single', opts: { pitches: [P('B','FF',-1,3), P('C','SL',0.3,2.2), P('F','FF',0.5,2.8), P('X','CH',-0.2,2)], notation: '1B', runners: [{ s:'HP', e:'1B' }] } },
    { label: 'Double', opts: { pitches: [P('B','CU',-0.8,1), P('X','FF',0.1,2.5)], notation: '2B', runners: [{ s:'HP', e:'2B' }] } },
    { label: 'Triple', opts: { pitches: [P('C','FF',0,2.8), P('X','SI',-0.3,2.2)], notation: '3B', runners: [{ s:'HP', e:'3B' }] } },
    { label: 'Home Run', opts: { pitches: [P('B','SL',-1,1.5), P('S','FF',0.2,3), P('X','FF',0.4,2.8)], notation: 'HR', isHR: true, runners: [{ s:'HP', e:'score' }] } },
  ]},
  { title: 'Outs', cells: [
    { label: 'Groundout', opts: { pitches: [P('X','SI',0,1.8)], notation: 'G63' } },
    { label: 'Flyout', opts: { pitches: [P('B','FF',1.2,3.5), P('F','SL',-0.3,2), P('X','FF',0.5,2.5)], notation: 'F8' } },
    { label: 'Double Play', opts: { pitches: [P('B','CH',-1,1.2), P('X','SI',-0.1,1.6)], notation: 'G643', runners: [{ s:'1B', e:'2B', out:true }] } },
    { label: 'Sac Fly', opts: { pitches: [P('C','FF',0.3,2.8), P('B','SL',-1,1), P('X','FF',0.4,3)], notation: 'SF9', runners: [{ s:'3B', e:'score' }] } },
  ]},
  { title: 'Runners + Subs', cells: [
    { label: 'Runner scores', opts: { pitches: [P('B','FF',-1,3), P('X','CH',-0.2,2)], notation: '1B', runners: [{ s:'HP', e:'1B' }, { s:'2B', e:'score' }] } },
    { label: 'Grand Slam', opts: { pitches: [P('B','SL',-1,1.5), P('X','FF',0.4,2.8)], notation: 'HR', isHR: true, runners: [{ s:'HP', e:'score' }, { s:'1B', e:'score' }, { s:'2B', e:'score' }, { s:'3B', e:'score' }] } },
    { label: 'Pinch Hitter', opts: { pitches: [P('B','FF',-1,3), P('X','CH',-0.2,2)], notation: '1B', runners: [{ s:'HP', e:'1B' }], subIndicator: 'PH' } },
    { label: 'Pitching Sub', opts: { pitches: [P('C','FF',0.2,2.5), P('S','SL',-0.5,1.8), P('S','CH',0.1,1.5)], notation: 'K', subIndicator: 'pitcher' } },
  ]},
  { title: 'Special', cells: [
    { label: 'Empty', opts: {} },
    { label: 'Active batter', opts: {} },  // bgFill set dynamically
    { label: 'Long AB (9 pitches)', opts: { pitches: [P('B','FF',-1,3.5), P('C','SL',0.3,2.5), P('F','FF',0.5,2.8), P('F','CU',-0.2,2), P('B','CH',1.2,1), P('F','FF',0.4,3), P('F','SL',-0.5,1.8), P('B','SI',-1.1,3.2), P('X','FF',0.1,2.5)], notation: '1B', runners: [{ s:'HP', e:'1B' }] } },
  ]},
];

function renderPreview() {
  const CLR = getCLR();
  const preview = document.getElementById('preview');
  preview.innerHTML = '';

  // Update background based on mode
  if (currentMode === 'dark') {
    preview.style.background = CLR.bg;
  } else {
    preview.style.background = '';
  }

  for (const section of samples) {
    const h2 = document.createElement('h2');
    h2.textContent = section.title;
    preview.appendChild(h2);

    const grid = document.createElement('div');
    grid.className = 'grid';

    for (const cell of section.cells) {
      const opts = { ...cell.opts };
      if (cell.label === 'Active batter') opts.bgFill = CLR.activeCell;

      const card = document.createElement('div');
      card.className = 'cell-card';
      card.appendChild(renderCell(CLR, opts));
      const lbl = document.createElement('div');
      lbl.className = 'label';
      lbl.textContent = cell.label;
      card.appendChild(lbl);
      grid.appendChild(card);
    }

    preview.appendChild(grid);
  }
}

// ── Mode toggle ─────────────────────────────────────────────────

document.querySelector('.mode-toggle').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-mode]');
  if (!btn) return;
  currentMode = btn.dataset.mode;
  document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (currentMode === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }

  buildControls();
  applyLive();
});

// ── Init ────────────────────────────────────────────────────────

document.getElementById('btn-save').addEventListener('click', save);
document.getElementById('btn-reset').addEventListener('click', reset);

await loadTokens();
buildControls();
applyLive();
</script>
</body>
