<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styles Editor — Baseball Scorebook</title>
  <link rel="stylesheet" href="/css/styles-editor.css">
</head>
<body>
  <div class="editor-layout">
    <!-- Sidebar -->
    <aside class="editor-sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>Styles Editor</h1>
        <a href="/" class="back-link">&larr; Home</a>
      </div>

      <div class="sidebar-toolbar">
        <button id="btn-reset" class="toolbar-btn" title="Reset all to defaults">Reset</button>
        <button id="btn-export" class="toolbar-btn" title="Export settings as JSON">Export</button>
        <button id="btn-import" class="toolbar-btn" title="Import settings from JSON">Import</button>
        <input type="file" id="import-file" accept=".json" hidden>
      </div>

      <div class="sidebar-controls" id="controls-container">
        <!-- Controls generated by JS -->
      </div>
    </aside>

    <!-- Preview -->
    <div class="preview-panel">
      <div class="preview-toolbar">
        <div class="viewport-presets">
          <button class="viewport-btn active" data-width="100%">Desktop</button>
          <button class="viewport-btn" data-width="768px">Tablet</button>
          <button class="viewport-btn" data-width="375px">Mobile</button>
        </div>
        <span class="preview-status" id="preview-status">Loading preview...</span>
      </div>
      <div class="preview-wrapper" id="preview-wrapper">
        <iframe id="preview-iframe" src="/game.html?dev&amp;gamePk=777242"></iframe>
      </div>
    </div>
  </div>

  <script type="module" src="/js/styles-editor.js"></script>
</body>
</html>
