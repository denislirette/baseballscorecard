<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>◆ Scorecard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>
<body>
  <header class="app-header">
    <a href="/" class="back-link"><span class="logo-diamond">◆</span> All Games</a>
    <h1 id="game-title">Loading...</h1>
    <button class="header-btn" id="theme-toggle" aria-label="Toggle dark mode"></button>
  </header>

  <div class="refresh-controls">
    <label>
      <input type="checkbox" id="auto-refresh" checked>
      Auto-refresh
    </label>
    <label>
      every <input type="number" id="refresh-interval" value="1" min="1" max="300" step="1"> sec
    </label>
    <button class="header-btn" id="save-interval-btn">Save</button>
    <span id="refresh-status"></span>
  </div>

  <main id="scorecard-container" class="scorecard-container">
    <p class="loading">Loading game data...</p>
  </main>

  <script type="module" src="/js/scorecard.js"></script>
  <script type="module" src="/js/nav.js"></script>
  <script type="module" src="/js/theme.js"></script>
</body>
</html>
