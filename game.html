<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Scorecard, BaseballScorecard.org</title>
  <meta name="description" content="Detailed SVG scorecard with pitch sequences, base paths, scoring notation, and pitcher stats for this MLB game.">
  <meta property="og:title" content="Game Scorecard - BaseballScorecard.org">
  <meta property="og:description" content="Detailed SVG scorecard with pitch sequences, base paths, scoring notation, and pitcher stats.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://baseballscorecard.org/img/social.jpg">
  <meta property="og:image:width" content="2400">
  <meta property="og:image:height" content="1260">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Game Scorecard - BaseballScorecard.org">
  <meta name="twitter:description" content="Detailed SVG scorecard with pitch sequences, base paths, scoring notation, and pitcher stats.">
  <meta name="twitter:image" content="https://baseballscorecard.org/img/social.jpg">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>
<body>
  <header class="app-header">
    <a href="/" class="back-link">All Games</a>
    <h1 id="game-title">Loading...</h1>
    <button class="header-btn" id="theme-toggle" aria-label="Toggle dark mode"></button>
  </header>

  <div class="refresh-controls" id="refresh-bar">
    <span class="refresh-label">Auto-refresh</span>
    <div class="refresh-presets" role="radiogroup" aria-label="Refresh interval">
      <button class="refresh-preset" data-seconds="0" role="radio" aria-checked="true">Off</button>
      <button class="refresh-preset" data-seconds="5" role="radio" aria-checked="false">5s</button>
      <button class="refresh-preset" data-seconds="10" role="radio" aria-checked="false">10s</button>
      <button class="refresh-preset" data-seconds="30" role="radio" aria-checked="false">30s</button>
      <button class="refresh-preset" data-seconds="60" role="radio" aria-checked="false">1m</button>
      <button class="refresh-preset" data-seconds="300" role="radio" aria-checked="false">5m</button>
    </div>
    <input type="number" id="refresh-custom" class="refresh-custom" min="1" max="600" placeholder="s" aria-label="Custom seconds">
    <span id="refresh-countdown" class="refresh-countdown"></span>
    <span id="refresh-status" aria-live="polite"></span>
  </div>

  <main id="scorecard-container" class="scorecard-container">
    <p class="loading">Loading game data...</p>
  </main>

  <script type="module" src="/js/nav.js"></script>
  <script type="module" src="/js/scorecard.js"></script>
</body>
</html>
